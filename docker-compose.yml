services:
  # 1. 你的 MySQL 数据库
  db:
    image: mysql:8.0
    container_name: dmma-db
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --skip-character-set-client-handshake
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dmma
    ports:
      - "3306:3306"
    volumes:
      - ./init_dmma_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 2. 补回来的 达梦数据库 (Dameng)
  dm8:
    image: teamide/dm8:v201106
    container_name: dm8
    ports:
      - "5236:5236"
    environment:
      SYSDBA_PWD: "Dameng@123"
      CHARSET: 1
    volumes:
      - dm8-data:/opt/dmdbms/data

  # 3. Metabase (带驱动版)
  metabase:
    image: metabase/metabase:v0.46.0
    container_name: metabase
    ports:
      - "3000:3000"
    volumes:
      - ./plugins:/plugins
      - ./metabase-data:/metabase-data
    environment:
      - MB_DB_FILE=/metabase-data/metabase.db
      - JAVA_TOOL_OPTIONS=-Dfile.encoding=UTF-8
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    depends_on:
      db:
        condition: service_healthy
      # 确保达梦也启动
      dm8:
        condition: service_started

volumes:
  dm8-data: